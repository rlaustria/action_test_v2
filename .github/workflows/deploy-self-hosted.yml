name: Deploy Self Hosted

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-self-hosted
  cancel-in-progress: true

env:
  IMAGE_NAME: hello-express
  CONTAINER_NAME: hello-express
  HOST_PORT: 3000
  CONTAINER_PORT: 3000

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy on self-hosted runner
    needs: test
    runs-on: [self-hosted, staging]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image locally
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Stop and delete existing container
        shell: powershell
        run: |
          $container = docker ps -a --filter "name=^hello-express$" --format "{{.Names}}"

          if ($container -eq "hello-express") {
            docker rm -f hello-express
          } else {
            Write-Host "Container hello-express does not exist. Skipping."
          }

      - name: Start new container
        run: >
          docker run -d
          --name ${{ env.CONTAINER_NAME }}
          --restart unless-stopped
          -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }}
          ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        shell: powershell
        run: |
          for ($attempt = 1; $attempt -le 10; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:${{ env.HOST_PORT }}/" -UseBasicParsing -ErrorAction Stop

              if ($response.StatusCode -eq 200) {
                Write-Host "Deployment verified."
                exit 0
              }
            } catch {
              Write-Host "Attempt $attempt failed: $($_.Exception.Message)"
            }

            Start-Sleep -Seconds 2
          }

          Write-Host "Deployment did not return a successful status code."
          docker logs ${{ env.CONTAINER_NAME }}
          exit 1

      - name: Tag successful local image
        run: docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
